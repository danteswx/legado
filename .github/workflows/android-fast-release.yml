name: Android Fast Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release-full:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Grant gradlew permission
        run: chmod +x gradlew

      - name: Release Apk Sign
        run: |
          echo -e "\n" >> gradle.properties
          echo RELEASE_KEY_ALIAS='${{ secrets.CI_DEBUG_KEY_ALIAS }}' >> gradle.properties
          echo RELEASE_KEY_PASSWORD='${{ secrets.CI_DEBUG_KEY_PASSWORD }}' >> gradle.properties
          echo RELEASE_STORE_PASSWORD='${{ secrets.CI_DEBUG_STORE_PASSWORD }}' >> gradle.properties
          echo RELEASE_STORE_FILE='./key.jks' >> gradle.properties
          echo ${{ secrets.CI_DEBUG_KEY_STORE_B64 }} | base64 --decode > $GITHUB_WORKSPACE/app/key.jks

      - name: Prepare release version
        id: version
        run: |
          VERSION_NAME="3.$(TZ=Asia/Shanghai date +%y.%m%d%H)"
          VERSION_CODE=$(($(date -u +%s) / 60))
          TAG_NAME="archive-v3-${VERSION_NAME}"
          {
            echo "name=${VERSION_NAME}"
            echo "code=${VERSION_CODE}"
            echo "tag=${TAG_NAME}"
          } >> "$GITHUB_OUTPUT"

          cat > release-notes.md <<EOF
          阅读Archive 第四版
          
          新增：
          - 新增底栏管理，支持保存多套底栏配置，并可分别设置日间、夜间图标。
          - 新增统计页组件化展示，可按需启用阅读目标、最近在读和阅读排行等组件。
          - 新增界面圆角与透明度配置，主要界面控件显示更统一。

          修复：
          - 修复发现页 WebView 长期驻留可能影响正文段评弹窗的问题。
          - 修复高级标题页面底部少一行、滚动模式显示异常的问题。
          - 修复详情页按钮样式、最近在读刷新不及时的问题。
          - 修复底栏主题重命名、删除和导出入口相关问题。
          - 修复主题背景图、在线图片和管理页显示相关问题。
          EOF

      - name: Build full release APK
        run: |
          ./gradlew :app:assembleAppRelease \
            -PVERSION_NAME="${{ steps.version.outputs.name }}" \
            -PVERSION_CODE="${{ steps.version.outputs.code }}" \
            --stacktrace

      - name: Resolve APK
        id: apk
        run: |
          APK_PATH=$(find app/build/outputs/apk/app/release -type f -name '*.apk' | head -n 1)
          APK_NAME=$(basename "$APK_PATH")
          echo "path=$APK_PATH" >> "$GITHUB_OUTPUT"
          echo "name=$APK_NAME" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: legado-release-full
          path: ${{ steps.apk.outputs.path }}

      - name: Publish versioned release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: 阅读Archive 第四版 ${{ steps.version.outputs.name }}
          prerelease: false
          make_latest: true
          generate_release_notes: false
          files: ${{ steps.apk.outputs.path }}
          body_path: release-notes.md

      - name: Refresh app update channel
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          CHANNEL_TAG="latest-arm64-release"
          RELEASE_ID=$(gh api repos/${{ github.repository }}/releases/tags/$CHANNEL_TAG --jq '.id' 2>/dev/null || true)
          if [ -n "$RELEASE_ID" ]; then
            gh api repos/${{ github.repository }}/releases/$RELEASE_ID/assets --paginate \
              --jq '.[] | select(.name | endswith(".apk")) | .id' \
              | while read -r ASSET_ID; do
                  gh api -X DELETE repos/${{ github.repository }}/releases/assets/$ASSET_ID
                done
            gh release upload "$CHANNEL_TAG" "${{ steps.apk.outputs.path }}" --clobber
            gh release edit "$CHANNEL_TAG" \
              --title "阅读Archive 更新通道" \
              --notes-file release-notes.md
          else
            gh release create "$CHANNEL_TAG" "${{ steps.apk.outputs.path }}" \
              --title "阅读Archive 更新通道" \
              --notes-file release-notes.md
          fi
