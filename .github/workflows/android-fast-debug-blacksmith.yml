name: Android Fast Debug Blacksmith

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-debug-arm64:
    runs-on: blacksmith-4vcpu-ubuntu-2404

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Grant gradlew permission
        run: chmod +x gradlew

      - name: Build arm64 debug APK
        run: |
          VERSION_CODE=$(($(date -u +%s) / 60))
          ./gradlew :app:assembleAppDebug \
            -Pabi=arm64-v8a \
            -PVERSION_CODE="$VERSION_CODE" \
            -PRELEASE_STORE_FILE=ci-debug.keystore \
            -PRELEASE_STORE_PASSWORD=legado-ci-debug \
            -PRELEASE_KEY_ALIAS=legado-ci-debug \
            -PRELEASE_KEY_PASSWORD=legado-ci-debug \
            --stacktrace

      - name: Resolve APK
        id: apk
        run: |
          APK_PATH=$(find app/build/outputs/apk -type f -name '*.apk' | head -n 1)
          APK_NAME=$(basename "$APK_PATH")
          echo "path=$APK_PATH" >> "$GITHUB_OUTPUT"
          echo "name=$APK_NAME" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: legado-debug-arm64-blacksmith
          path: ${{ steps.apk.outputs.path }}
