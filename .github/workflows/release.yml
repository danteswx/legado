name: Release

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  book-source-test:
    name: Book Source Tests
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run book source sample tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          script: |
            chmod +x gradlew
            ./gradlew :app:connectedAppDebugAndroidTest "-Pandroid.testInstrumentationRunnerArguments.class=io.legado.app.BookSourceSampleInstrumentedTest" --no-daemon --stacktrace --warning-mode all

  build:
    name: Build
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.set-version.outputs.version }}
    env:
      product: app
      GITHUB_REPOSITORY: ${{ github.repository }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set version
        id: set-version
        shell: bash
        run: |
          VERSION="$(date -d "8 hour" -u +3.%y.%m%d%H%M)"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "VERSION_NAME=${VERSION}"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11
          run_install: false

      - name: Build web assets
        working-directory: modules/web
        run: |
          pnpm i
          pnpm build

      - name: Clear 18PlusList.txt
        run: |
          echo "" > "$GITHUB_WORKSPACE/app/src/main/assets/18PlusList.txt"

      - name: Configure release signing key
        shell: bash
        run: |
          set -euo pipefail

          has_release_key=0
          missing=()
          for name in RELEASE_KEY_STORE RELEASE_KEY_ALIAS RELEASE_KEY_PASSWORD RELEASE_STORE_PASSWORD; do
            value="${!name:-}"
            if [ -n "$value" ]; then
              has_release_key=1
            else
              missing+=("$name")
            fi
          done

          if [ "$has_release_key" -eq 1 ] && [ "${#missing[@]}" -gt 0 ]; then
            printf "::error::Missing release signing secret: %s\n" "${missing[@]}"
            exit 1
          fi

          if [ "$has_release_key" -eq 1 ]; then
            echo "Using release signing key from secrets."
            {
              echo "RELEASE_KEY_ALIAS=${RELEASE_KEY_ALIAS}"
              echo "RELEASE_KEY_PASSWORD=${RELEASE_KEY_PASSWORD}"
              echo "RELEASE_STORE_PASSWORD=${RELEASE_STORE_PASSWORD}"
              echo "RELEASE_STORE_FILE=./key.jks"
            } >> "$GITHUB_WORKSPACE/gradle.properties"
            echo "$RELEASE_KEY_STORE" | base64 --decode > "$GITHUB_WORKSPACE/app/key.jks"
          else
            echo "::warning::Release signing secrets are not configured; using the checked-in CI signing key."
            {
              echo "RELEASE_STORE_FILE=./ci-debug.keystore"
              echo "RELEASE_KEY_ALIAS=legado-ci-debug"
              echo "RELEASE_STORE_PASSWORD=legado-ci-debug"
              echo "RELEASE_KEY_PASSWORD=legado-ci-debug"
            } >> "$GITHUB_WORKSPACE/gradle.properties"
          fi
        env:
          RELEASE_KEY_STORE: ${{ secrets.RELEASE_KEY_STORE }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build release APK
        run: |
          chmod +x gradlew
          ./gradlew -PVERSION_NAME="${VERSION}" assembleAppRelease --build-cache --parallel --daemon --warning-mode all

      - name: Organize build outputs
        run: |
          shopt -s nullglob
          mkdir -p "${{ github.workspace }}/apk"
          mkdir -p "${{ github.workspace }}/mapping"
          for file in "${{ github.workspace }}"/app/build/outputs/apk/*/*/*.apk; do
            cp "$file" "${{ github.workspace }}/apk/legado_${{ env.product }}_${VERSION}.apk"
          done
          for file in "${{ github.workspace }}"/app/build/outputs/mapping/*/mapping.txt; do
            cp "$file" "${{ github.workspace }}/mapping/mapping.txt"
          done
          for file in "${{ github.workspace }}"/app/build/outputs/mapping/*/missing_rules.txt; do
            cp "$file" "${{ github.workspace }}/mapping/missing_rules.txt"
          done

      - name: Check build outputs
        run: |
          test -d "${{ github.workspace }}/apk"
          test -n "$(find "${{ github.workspace }}/apk" -maxdepth 1 -name 'legado_*.apk' -print -quit)"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: legado.app
          if-no-files-found: error
          path: ${{ github.workspace }}/apk/*.apk

      - name: Upload mapping artifact
        uses: actions/upload-artifact@v4
        with:
          name: legado.app.mapping
          if-no-files-found: ignore
          path: ${{ github.workspace }}/mapping/mapping.txt

      - name: Upload missing rules artifact
        uses: actions/upload-artifact@v4
        with:
          name: legado.app.mapping.missing_rules
          if-no-files-found: ignore
          path: ${{ github.workspace }}/mapping/missing_rules.txt

  publish:
    name: Publish
    needs:
      - book-source-test
      - build
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.build.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: legado.app
          path: apk

      - name: Generate changelog
        run: |
          echo "## Legado ${VERSION}" > release_notes.md
          echo "" >> release_notes.md
          echo "### Download" >> release_notes.md
          echo "- [legado_app_${VERSION}.apk](https://github.com/${{ github.repository }}/releases/download/${VERSION}/legado_app_${VERSION}.apk)" >> release_notes.md
          echo "" >> release_notes.md
          echo "### Changes" >> release_notes.md
          echo "" >> release_notes.md
          python3 .github/scripts/generate_changelog.py >> release_notes.md
          echo "" >> release_notes.md
          echo "---" >> release_notes.md
          echo "Automated release build." >> release_notes.md

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: legado_app_${{ env.VERSION }}
          tag_name: ${{ env.VERSION }}
          body_path: release_notes.md
          draft: false
          prerelease: false
          files: apk/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
