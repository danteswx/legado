name: Sync Upstream Releases

on:
  workflow_dispatch:   # 手动触发
  schedule:
    - cron: '0 2 * * *' # 每天 02:00 自动同步

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 必须，才能创建/更新 release
    steps:
      - name: Sync releases from upstream
        uses: aminya/sync-releases@v1
        with:
          source: Nowaterisenough/legado       # 上游源仓库
          destination: ${{ github.repository }} # 你的 fork
          token: ${{ secrets.GITHUB_TOKEN }}    # 访问上游（公开仓库够用）
          destination-token: ${{ secrets.GITHUB_TOKEN }} # 写到你的仓库
          # 可选：只同步 tag 存在的，避免垃圾 release
          skip-empty-releases: true
