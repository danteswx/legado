name: 同步上游 Releases

on:
  # 手动触发
  workflow_dispatch:
  # 每天凌晨 2 点自动同步
  schedule:
    - cron: '0 2 * * *'

jobs:
  sync-releases:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 必须开启，才能上传 Release
    steps:
      - name: 同步 Releases
        uses: appleniki/sync-releases@main
        with:
          # 上游原仓库（固定不动）
          upstream_repo: Nowaterisenough/legado
          # 你的 Fork 仓库（自动读取，无需修改）
          target_repo: ${{ github.repository }}
          # GitHub Token（自动使用）
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # 同步最新 200 个 Release（足够用）
          max_releases: 200
