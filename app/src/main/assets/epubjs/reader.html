<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #f7f3ea;
    }
    #viewer {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }
  </style>
  <script src="jszip.min.js"></script>
  <script src="epub.min.js"></script>
</head>
<body>
  <div id="viewer"></div>
  <script>
    let book = null;
    let rendition = null;
    let locationsReady = false;

    function notify(type, payload) {
      if (window.AndroidBridge && AndroidBridge.onEvent) {
        AndroidBridge.onEvent(type, JSON.stringify(payload || {}));
      }
    }

    function applyTheme() {
      if (!rendition || !window.AndroidBridge) return;
      const style = JSON.parse(AndroidBridge.getStyle());
      document.body.style.background = style.background || "#f7f3ea";
      rendition.themes.default({
        "html": {
          "background": style.background || "#f7f3ea"
        },
        "body": {
          "background": style.background || "#f7f3ea",
          "color": style.color || "#2f2a24",
          "line-height": style.lineHeight || "1.55",
          "font-size": style.fontSize || "100%",
          "font-family": style.fontFamily || "sans-serif",
          "letter-spacing": style.letterSpacing || "normal",
          "padding": style.padding || "0 16px",
          "box-sizing": "border-box"
        },
        "p": {
          "margin-top": "0",
          "margin-bottom": style.paragraphSpacing || "0.8em"
        },
        "img": {
          "max-width": "100%",
          "height": "auto",
          "object-fit": "contain"
        },
        "svg": {
          "max-width": "100%",
          "height": "auto"
        },
        "body > div:only-child svg:only-child": {
          "display": "block",
          "width": "100%",
          "height": "auto"
        }
      });
    }

    function injectContentStyles(contents) {
      const isScroll = AndroidBridge.isScrollMode();
      const css = `
        html, body {
          background: transparent !important;
          ${isScroll ? "height: auto !important; min-height: 100% !important; overflow: visible !important;" : ""}
        }
        body {
          box-sizing: border-box !important;
        }
        img, svg, image {
          max-width: 100% !important;
          object-fit: contain !important;
          break-inside: avoid !important;
          page-break-inside: avoid !important;
        }
        img {
          height: auto !important;
          max-height: none !important;
        }
        svg {
          height: auto !important;
          max-height: none !important;
          overflow: visible !important;
        }
        body > div:only-child,
        body > p:only-child,
        body > figure:only-child {
          max-height: none !important;
          overflow: visible !important;
        }
        body > div:only-child svg:only-child,
        body > div:only-child img:only-child,
        body > p:only-child img:only-child,
        body > figure:only-child img:only-child {
          display: block !important;
          width: 100% !important;
          height: auto !important;
          max-height: none !important;
          margin-left: auto !important;
          margin-right: auto !important;
        }
        [style*="height: 100%"], [style*="height:100%"] {
          ${isScroll ? "height: auto !important; max-height: none !important;" : ""}
        }
      `;
      try {
        contents.addStylesheetRules({ "body": { "background": "transparent !important" } });
        contents.addStylesheet("data:text/css;charset=utf-8," + encodeURIComponent(css));
      } catch (e) {
        const doc = contents.document;
        if (doc && doc.head) {
          const style = doc.createElement("style");
          style.textContent = css;
          doc.head.appendChild(style);
        }
      }
    }

    function createRendition() {
      rendition = book.renderTo("viewer", {
        width: "100%",
        height: "100%",
        flow: AndroidBridge.isScrollMode() ? "scrolled-doc" : "paginated",
        manager: "default",
        spread: "none"
      });
      applyTheme();
      rendition.hooks.content.register(injectContentStyles);
      rendition.on("relocated", location => {
        notify("location", {
          cfi: location.start && location.start.cfi,
          percentage: book.locations && location.start
            ? book.locations.percentageFromCfi(location.start.cfi)
            : 0
        });
      });
      rendition.on("rendered", section => {
        notify("chapter", { href: section.href, title: section.label || "" });
      });
    }

    async function openBook() {
      try {
        if (!window.JSZip) {
          throw new Error("JSZip lib not loaded");
        }
        if (!window.ePub) {
          throw new Error("epub.js lib not loaded");
        }
        const bookUrl = AndroidBridge.getBookUrl();
        if (!bookUrl) {
          throw new Error("EPUB OPF url is empty");
        }
        book = ePub(bookUrl);
        createRendition();
        await book.ready;
        notify("toc", {
          toc: (book.navigation && book.navigation.toc) || []
        });
        book.locations.generate(1200).then(() => {
          locationsReady = true;
        });
        const saved = AndroidBridge.getSavedCfi();
        await rendition.display(saved || undefined);
        notify("ready", {});
      } catch (e) {
        notify("error", { message: String(e && e.message ? e.message : e) });
      }
    }

    function nextPage() {
      if (rendition) rendition.next();
    }

    function prevPage() {
      if (rendition) rendition.prev();
    }

    function display(cfiOrHref) {
      if (rendition && cfiOrHref) rendition.display(cfiOrHref);
    }

    function displayByPercentage(percentage) {
      if (!book || !book.locations || !locationsReady) return;
      const cfi = book.locations.cfiFromPercentage(percentage);
      if (cfi && rendition) rendition.display(cfi);
    }

    function setStyle() {
      applyTheme();
    }

    function setScrollMode() {
      const cfi = AndroidBridge.getSavedCfi();
      if (rendition) rendition.destroy();
      createRendition();
      rendition.display(cfi || undefined);
    }

    document.addEventListener("DOMContentLoaded", openBook);
  </script>
</body>
</html>
